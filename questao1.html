<script>
//01. Escreva um programa que pede o raio de um círculo, e em seguida exiba o perímetro e área do círculo.

//ENTRADA
    let r = parseInt(prompt("Digite o valor de Raio"))
 /*formula do
area = pi * raio elevado ao quadrado
barra asterístico
simboliza o comentario de bloco*/

//PROCESSO
let area = 3.14 * (r ** 2);

//SAÍDA
document.write("O valor da area e : "+ area)

/*
ordem de precedência
1 potencia
2 * ou /
3 + ou -
*/

</script>

<script>
/*03. Agora faça o contrário. Você fornece a temperatura em graus Fahrenheit,
seu programa deve converter para Celsius e exibir na tela a temperatura em graus Celsius*/

//ENTRADA

let C = parseInt(prompt("informe a temperatura em Celsius"));

//PROCESSO

let F = C * 1.8 + 32;

//SAÍDA

document.write(C+ " Celsios em Fahrenheit é : " + F);

</script>

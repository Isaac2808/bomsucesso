<script>

/*04. Um novo modelo de carro, super econômico foi lançado.
Ele faz 20 km com 1 litro de combustível.
Cada litro de combustível custa R$ 5,00*/

//ENTRADA

let dinheiro = parseInt(prompt("informe quanto vc tem em dinheiro"));


//PROCESSO
 let L = dinheiro / 5;
let km = L*20;


//SAÍDA
document.write(" Esse é o total de litro:  " +L+"<br/>");
document.write(" Esse é o total de Km:  " +km);

</script>
